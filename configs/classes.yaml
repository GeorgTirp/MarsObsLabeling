# Terrain class legend for Mars observations
# id MUST be a stable small int >= 0; never renumber existing ids.
# hotkey: a single character; must be unique across classes.
classes:
  - { id: 0,  name: "Bedrock",     color: "#4C72B0", hotkey: "q" }
  - { id: 1,  name: "Sand",        color: "#D4A574", hotkey: "w" }
  - { id: 2,  name: "Not Available", color: "#808080", hotkey: "e" }

# Reserved, not user-assignable via class hotkeys:
abstain:
  id: -1
  name: "Abstain"
  color: "#000000"
  hotkey: "space"

nodata:
  id: -2
  name: "No data"
  color: "#222222"
