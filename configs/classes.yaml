# Terrain class legend for Mars observations
# id MUST be a stable small int >= 0; never renumber existing ids.
# hotkey: a single character; must be unique across classes.
classes:
  - { id: 0,  name: "Smooth bedrock",    color: "#4C72B0", hotkey: "q" }
  - { id: 1,  name: "Fractured bedrock", color: "#DD8452", hotkey: "w" }
  - { id: 2,  name: "Boulder field",     color: "#55A868", hotkey: "e" }
  - { id: 3,  name: "Ripples/TARs",      color: "#C44E52", hotkey: "r" }
  - { id: 4,  name: "Sand sheet",        color: "#8172B3", hotkey: "a" }
  - { id: 5,  name: "Dust/mantled",      color: "#937860", hotkey: "s" }
  - { id: 6,  name: "Crater interior",   color: "#DA8BC3", hotkey: "d" }
  - { id: 7,  name: "Slope/scarp",       color: "#8C8C8C", hotkey: "f" }

# Reserved, not user-assignable via class hotkeys:
abstain:
  id: -1
  name: "Abstain"
  color: "#000000"
  hotkey: "space"

nodata:
  id: -2
  name: "No data"
  color: "#222222"
